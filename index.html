<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slider Otomatis</title>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:white;
}

/* Slider */

.swiper{
    width:100%;
    height:60vw;
    min-height:250px;
    max-height:600px;
}

/* Slide */

.swiper-slide{
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Gambar */

.swiper-slide img{

    max-width:100%;
    max-height:100%;

    width:auto;
    height:auto;

    object-fit:contain;

    display:block;
}

/* Tombol */

.swiper-button-next,
.swiper-button-prev{
    color:white;
}

/* Pagination */

.swiper-pagination-bullet{
    opacity:.8;
}

.swiper-pagination-bullet-active{
    opacity:1;
}

/* Tablet */

@media(max-width:768px){

    .swiper{
        height:55vw;
    }

}

/* HP */

@media(max-width:480px){

    .swiper{
        height:50vw;
        min-height:180px;
    }

    .swiper-button-next,
    .swiper-button-prev{
        transform:scale(.7);
    }

}

</style>
</head>

<body>

<div class="swiper">

    <div class="swiper-wrapper" id="sliderWrapper">

    </div>

    <div class="swiper-pagination"></div>

    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

fetch('images.json')

.then(response => response.json())

.then(images => {

    const wrapper =
    document.getElementById('sliderWrapper');

    images.forEach(image => {

        const slide =
        document.createElement('div');

        slide.className = 'swiper-slide';

        slide.innerHTML = `
            <img src="images/${image}" alt="">
        `;

        wrapper.appendChild(slide);

    });

    new Swiper('.swiper', {

        loop:true,

        autoplay:{
            delay:5000,
            disableOnInteraction:false
        },

        pagination:{
            el:'.swiper-pagination',
            clickable:true
        },

        navigation:{
            nextEl:'.swiper-button-next',
            prevEl:'.swiper-button-prev'
        }

    });

})

.catch(error => {

    console.error(error);

});

</script>

</body>
</html>
