<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slider Pengumuman</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f3f5;
    overflow-x:hidden;
    padding:10px 0 35px;
}

.swiper{

    width:100%;
    max-width:700px;
    margin:auto;
    overflow:visible;

}

.swiper-slide{

    display:flex;
    justify-content:center;
    align-items:center;

    transition:.3s;

}

.swiper-slide img{

    width:100%;
    max-width:430px;

    height:auto;

    border-radius:14px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.25);

    display:block;

}

.swiper-button-next,
.swiper-button-prev{

    color:#ffffff;
    background:rgba(0,0,0,.35);

    width:45px;
    height:45px;

    border-radius:50%;

    backdrop-filter:blur(6px);

}

.swiper-button-next::after,
.swiper-button-prev::after{

    font-size:18px;

}

.swiper-pagination{

    position:relative;
    margin-top:20px;

}

.swiper-pagination-bullet{

    width:10px;
    height:10px;

    opacity:.5;

}

.swiper-pagination-bullet-active{

    opacity:1;
    transform:scale(1.4);

}

/* Tablet */

@media(max-width:768px){

.swiper{

    max-width:500px;

}

.swiper-slide img{

    max-width:330px;

}

}

/* HP */

@media(max-width:480px){

.swiper{

    max-width:100%;

}

.swiper-slide img{

    max-width:260px;

}

.swiper-button-next,
.swiper-button-prev{

    transform:scale(.8);

}

}

</style>

</head>

<body>

<div class="swiper">

    <div class="swiper-wrapper"
    id="sliderWrapper"></div>

    <div class="swiper-button-prev"></div>

    <div class="swiper-button-next"></div>

    <div class="swiper-pagination"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

fetch("images.json")

.then(r=>r.json())

.then(images=>{

const wrapper=document.getElementById("sliderWrapper");

images.forEach(img=>{

const slide=document.createElement("div");

slide.className="swiper-slide";

slide.innerHTML=`
<img src="images/${img}" loading="lazy">
`;

wrapper.appendChild(slide);

});

new Swiper(".swiper",{

loop:true,

centeredSlides:true,

slidesPerView:1.2,

spaceBetween:20,

effect:"coverflow",

coverflowEffect:{

rotate:0,

stretch:0,

depth:180,

modifier:1,

scale:.88,

slideShadows:false

},

autoplay:{

delay:5000,

disableOnInteraction:false

},

pagination:{

el:".swiper-pagination",

clickable:true

},

navigation:{

nextEl:".swiper-button-next",

prevEl:".swiper-button-prev"

},

breakpoints:{

480:{
slidesPerView:1.3
},

768:{
slidesPerView:1.6
},

1024:{
slidesPerView:1.8
}

}

});

});

</script>

</body>

</html>
